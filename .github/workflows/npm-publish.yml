name: Publish to npm

# Method "npx": on a version tag, publish the package to npm so `npx interactive-preview-skill` works.
#
# One-time setup: add a repo secret named NPM_TOKEN (npm → Access Tokens → Automation token).
# Before each tag, bump "version" in package.json — npm rejects re-publishing the same version.
on:
  push:
    tags:
      - "v*"

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: "https://registry.npmjs.org"
      - run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
